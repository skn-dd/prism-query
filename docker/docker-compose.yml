version: "3.8"

services:
  coordinator:
    build:
      context: ..
      dockerfile: docker/Dockerfile.coordinator
    ports:
      - "8080:8080"
    environment:
      - JAVA_OPTS=-Xmx4G
    volumes:
      - ./etc/catalog:/opt/prism/etc/catalog
      - ./etc/ranger:/opt/prism/etc/ranger
    networks:
      - prism

  worker-1:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    ports:
      - "8081:8080"
      - "50051:50051"
    environment:
      - JAVA_OPTS=-Xmx8G
      - PRISM_FLIGHT_PORT=50051
    depends_on:
      - coordinator
    networks:
      - prism

  worker-2:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    ports:
      - "8082:8080"
      - "50052:50051"
    environment:
      - JAVA_OPTS=-Xmx8G
      - PRISM_FLIGHT_PORT=50051
    depends_on:
      - coordinator
    networks:
      - prism

  # Apache Ranger for access control (optional)
  ranger:
    image: apache/ranger:2.4.0
    ports:
      - "6080:6080"
    environment:
      - RANGER_ADMIN_PASSWORD=admin
    networks:
      - prism
    profiles:
      - security

networks:
  prism:
    driver: bridge
